name: Application Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'docker/**'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      ACR_NAME: acr501funprod
      RESOURCE_GROUP: rg-501fun-prod
      AKS_CLUSTER: aks-501fun-prod
      CONTAINER_APP: ca-central-config

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR Login
        run: az acr login --name $ACR_NAME

      - name: Build Docker Image
        run: |
          docker build -t $ACR_NAME.azurecr.io/central-config:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push $ACR_NAME.azurecr.io/central-config:${{ github.sha }}

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group $RESOURCE_GROUP \
            --name $AKS_CLUSTER \
            --overwrite-existing

      - name: Deploy to AKS
        run: |
          kubectl set image deployment/backend-api \
            backend-api=$ACR_NAME.azurecr.io/backend-api:${{ github.sha }}

      - name: Update Container App
        run: |
          az containerapp update \
            --name $CONTAINER_APP \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/central-config:${{ github.sha }}